  <meta
    property="og:description"
    content="Lock distracting apps. Learn a few facts. Come back with intention."
  >
  <meta property="og:type" content="website">

  <link rel="icon" type="image/png" sizes="180x180" href="/favicon.png">

<body>
  <div class="site-shell site-shell--home">
    <header class="site-header">
      <a class="brand" href="/">
        <img class="brand-icon" src="/appIcon.png" width="40" height="40" alt="">
        <span>wise<span class="brand-lock">lock</span></span>
      </a>
    </header>

    <div class="mobile-spacer" aria-hidden="true"></div>

    <main>
      <div class="hero-main">
        <div class="hero-copy">
          <p class="hero-lead">
            <span class="sr-only">Lock distracting apps until you learn something new.</span>
            <span class="hero-typewriter" aria-hidden="true">
              <span id="type-prefix"></span><span id="type-highlight" class="hero-lead-highlight"></span><span id="type-suffix"></span><span id="type-cursor" class="typewriter-cursor"></span>
            </span>
          </p>
          <div class="hero-actions">
            <a
              class="app-store-badge-link"
              href="https://apps.apple.com/"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img
                class="app-store-badge-img"
                src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us?size=250x83"
                width="280"
                height="92"
                alt="Download on the App Store"
              >
            </a>
          </div>
        </div>
        <figure class="hero-device-shot">
          <a href="https://apps.apple.com/" target="_blank" rel="noopener noreferrer">
            <img
              class="hero-screenshot"
              src="/wiselockappPromo.png"

          <a href="/terms/">Terms of Service</a>

          <span class="footer-dot">•</span>
          <a href="mailto:alpsudilbilir@gmail.com?subject=wiselock%20support">Contact Us</a>
        </nav>
        <p class="footer-legal">&copy; 2026 wiselock. All rights reserved.</p>
      </div>
    </footer>
  </div>
  <script>
    (function () {
      const prefix = "Lock distracting apps until you ";
      const highlight = "learn something new";
      const suffix = ".";
      const speedMs = 44;

      const prefixEl = document.getElementById("type-prefix");
      const highlightEl = document.getElementById("type-highlight");
      const suffixEl = document.getElementById("type-suffix");
      const cursorEl = document.getElementById("type-cursor");
      if (!prefixEl || !highlightEl || !suffixEl) return;

      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      function sleep(ms) {
        return new Promise(function (resolve) {
          setTimeout(resolve, ms);
        });
      }

      async function typeOnce() {
        prefixEl.textContent = "";
        highlightEl.textContent = "";
        suffixEl.textContent = "";
        if (cursorEl) {
          cursorEl.classList.remove("typewriter-cursor--done");
        }

        for (let i = 0; i < prefix.length; i++) {
          prefixEl.textContent += prefix[i];
          await sleep(speedMs);
        }
        for (let i = 0; i < highlight.length; i++) {
          highlightEl.textContent += highlight[i];
          await sleep(speedMs);
        }
        for (let i = 0; i < suffix.length; i++) {
          suffixEl.textContent += suffix[i];
          await sleep(speedMs);
        }
        if (cursorEl) {
          cursorEl.classList.add("typewriter-cursor--done");
        }
      }

      if (reduceMotion) {
        prefixEl.textContent = prefix;
        highlightEl.textContent = highlight;
        suffixEl.textContent = suffix;
        if (cursorEl) {
          cursorEl.classList.add("typewriter-cursor--done");
        }
      } else {
        typeOnce();
      }
    })();
  </script>
</body>
